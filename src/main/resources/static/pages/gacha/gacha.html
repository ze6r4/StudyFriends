<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Friends — Новый друг</title>
    <link rel="stylesheet" href="gacha.css">

</head>
<body>

<div class="scene" id="scene">
    <img id="bg" src="../../assets/images/other/gacha_bg.png">

    <img id="bus" src="../../assets/images/other/bus.png">

    <!-- затемнение + зум -->
    <div id="zoomLayer"></div>

    <!-- вспышка -->
    <div id="particles"></div>
    <div id="flash">
        <div class="flash-circle"></div>
    </div>

    <!-- полученный персонаж -->

    <div id="reward">
        <img id="rewardImg" src="../../assets/images/characters/nick_stand.png">

    </div>
    <div class ="characterName">
        Ник
    </div>
    <div class="title" id="title" hidden="hidden">
        В город приехал новый персонаж!
    </div>



</div>

<div class="coin-display" id = "coin-display">
    <span class="coin-count">0</span>
</div>

<button class="start-btn" id="startBtn">
    <svg id="svg" width="300" height="250" viewBox="-4 -4 508 208" xmlns="http://www.w3.org/2000/svg">
        <path d="
            M 20,0
            H 480
            A 20,20 0 0 1 500,20
            V 70
            A 20,20 0 0 0 500,130
            V 180
            A 20,20 0 0 1 480,200
            H 20
            A 20,20 0 0 1 0,180
            V 130
            A 20,20 0 0 0 0,70
            V 20
            A 20,20 0 0 1 20,0
            Z
          "
      fill="#f9f3e7"
      stroke="#8c6f64"
      stroke-width="3"
      vector-effect="non-scaling-stroke"/>

    </svg>
    <span class="btn-text">Купить билет<br>150🪙</span>
</button>
<button id="okBtn" class="ok-btn" hidden>На главную</button>



<script src="js/animation.js"></script>
<script type="module" src="js/gacha.js"></script>
</body>
</html>
