<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/timer.css">
    <link rel="stylesheet" href="css/reward.css">
</head>
<body>

<header class="phase-header">
    <span id="phaseTitle">Работа</span>
</header>

<div class="bg">
    <img
            id="tableImg"
            src = "/assets/images/table_bg.png"
            alt="олоол"
    >
    <img
            id="notesImg"
            src = "/assets/images/notes_bg.png"
            alt="Фон"

    >

    <img
            id="characterImg"
            src = ""
            alt="персонаж"
    >
</div>



<div class="container">

    <!-- БЛОКНОТ -->
    <div class="notebook-section">
        <div class="notebook">

            <div class="notebook-rings">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
            </div>

            <div class="notebook-content">

                <div
                        id="notesContent"
                        class="notes-content"
                        contenteditable="true"
                >
                    <p>Можно редактировать этот текст прямо здесь...</p>
                </div>
            </div>

        </div>
    </div>

</div>
<div id="rewardsModal" class="rewards-modal hidden">
    <div class="rewards-content">

        <h2 class="rewards-title">Поздравляю! Мы справились!</h2>

        <!-- ===== НАВЫК ===== -->
        <div class="reward-block">
            <h3>Навык</h3>

            <div class="stage-label" id="skillStage"></div>
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="skillProgress"></div>
                </div>

                <div class="progress-labels">
                    <span id="skillLevel">1</span>
                    <span id="skillMaxXp">100</span>
                </div>
            </div>
        </div>

        <!-- ===== ДРУЖБА ===== -->
        <div class="reward-block">
            <h3>Уровень дружбы</h3>

            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="friendProgress"></div>
                </div>

                <div class="progress-labels">
                    <span id="friendLevel">1</span>
                    <span id="friendMaxXp">100</span>
                </div>
            </div>
        </div>

        <!-- ===== МОНЕТЫ ===== -->
        <div class="coins-block">
            <p>Навык: <span id="coinsSkill"></span></p>
            <p>Дружба: <span id="coinsFriend"></span></p>
            <p>Сессия: <span id="coinsSession"></span></p>

            <p class="divider">- - - - - - - -</p>

            <p class="total">
                ИТОГО:
                <span id="coinsTotal"></span> 🪙
            </p>
        </div>

        <button id="closeRewardsBtn">ОК</button>
    </div>
</div>
<!-- ТАЙМЕР + КНОПКА -->
<div class="bottom-left">

    <div class="timer-standalone">
        <span id="timer-minutes">25</span>    <span id="timer-seconds">00</span>
    </div>

    <button  class="image-button" id="startBtn" >
        <img src="/assets/images/start_button.png" alt="Начать">
    </button>
    <button class="image-button" id="exitBtn" style="display:none;">
        Выйти
    </button>
</div>

<footer class="footer hidden">
    <div class="dev-controls">
        <button id="devModeBtn">Режим разработчика</button>
        <button id="finishNowBtn">Закончить сессию</button>
        <button id="resetTimerDevBtn">Очистить localStorage</button>
    </div>
</footer>

<script type="module" src="js/timer.js"></script>
<script src="js/notes-storage.js" defer></script>

</body>
</html>
